<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gritted Teeth - iPhone Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      color: #fff;
      padding: 40px 20px;
    }
    h1 { font-size: 13px; color: #555; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 4px; }
    .device-picker { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
    .device-btn {
      padding: 6px 14px; background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #666; border-radius: 20px; cursor: pointer; font-size: 11px; letter-spacing: 1px; transition: all 0.15s;
    }
    .device-btn:hover { border-color: #D4820A; color: #D4820A; }
    .device-btn.active { background: #D4820A; border-color: #D4820A; color: #000; font-weight: 700; }
    .url-bar {
      background: #111; border: 1px solid #222; border-radius: 8px;
      padding: 7px 16px; font-size: 12px; color: #555; margin-bottom: 20px;
    }
    .url-bar span { color: #D4820A; }
    .phone-wrapper { position: relative; }
    .iphone-frame {
      position: relative; background: #1c1c1e; border-radius: 56px; padding: 14px;
      box-shadow: 0 0 0 1px #38383a, 0 0 0 3px #1c1c1e, 0 0 0 4px #38383a,
        0 30px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .screen {
      position: relative; border-radius: 44px; overflow: hidden; background: #000;
      width: 390px; height: 844px; transition: width 0.2s, height 0.2s;
    }
    .dynamic-island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 10; pointer-events: none;
    }
    .status-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 59px; z-index: 9;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 28px 8px; font-size: 15px; font-weight: 600; color: #fff; pointer-events: none;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .home-indicator {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; background: rgba(255,255,255,0.35); border-radius: 3px; z-index: 10; pointer-events: none;
    }
    .app-frame { border: none; display: block; }
    .btn-silent { position: absolute; left: -5px; top: 84px; width: 5px; height: 26px; background: #2c2c2e; border-radius: 3px 0 0 3px; }
    .btn-vol-up { position: absolute; left: -5px; top: 124px; width: 5px; height: 36px; background: #2c2c2e; border-radius: 3px 0 0 3px; }
    .btn-vol-dn { position: absolute; left: -5px; top: 172px; width: 5px; height: 36px; background: #2c2c2e; border-radius: 3px 0 0 3px; }
    .btn-power { position: absolute; right: -5px; top: 148px; width: 5px; height: 70px; background: #2c2c2e; border-radius: 0 3px 3px 0; }
    .tip { margin-top: 18px; font-size: 11px; color: #333; text-align: center; line-height: 2; }
    .tip a { color: #D4820A; text-decoration: none; }
    .tip kbd { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1px 6px; font-size: 10px; color: #888; }
  </style>
</head>
<body>
  <h1>Gritted Teeth &mdash; iPhone Preview</h1>
  <div class="device-picker">
    <button class="device-btn active" onclick="setDevice(this,390,844,'iPhone 14')">iPhone 14</button>
    <button class="device-btn" onclick="setDevice(this,393,852,'iPhone 15 Pro')">iPhone 15 Pro</button>
    <button class="device-btn" onclick="setDevice(this,430,932,'iPhone 14 Plus')">iPhone 14 Plus</button>
    <button class="device-btn" onclick="setDevice(this,375,667,'iPhone SE')">iPhone SE</button>
  </div>
  <div class="url-bar">localhost:3000 &mdash; <span id="device-label">iPhone 14 390x844</span></div>
  <div class="phone-wrapper">
    <div class="iphone-frame">
      <div class="btn-silent"></div>
      <div class="btn-vol-up"></div>
      <div class="btn-vol-dn"></div>
      <div class="btn-power"></div>
      <div class="screen" id="screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span id="clock">9:41</span>
          <div class="status-icons">
            <svg width="17" height="12" viewBox="0 0 17 12" fill="white">
              <rect x="0" y="8" width="3" height="4" rx="1"/>
              <rect x="4.5" y="5" width="3" height="7" rx="1"/>
              <rect x="9" y="2" width="3" height="10" rx="1"/>
              <rect x="13.5" y="0" width="3" height="12" rx="1"/>
            </svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <circle cx="8" cy="10.5" r="1.5" fill="white"/>
              <path d="M3.5 7C5 5.3 6.4 4.5 8 4.5s3 .8 4.5 2.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M.5 4C2.8 1.5 5.2 0 8 0s5.2 1.5 7.5 4" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
              <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white" stroke-opacity="0.35"/>
              <rect x="2" y="2" width="18" height="9" rx="2" fill="white"/>
              <path d="M25 4.5v4a2.5 2.5 0 0 0 0-4z" fill="white" fill-opacity="0.4"/>
            </svg>
          </div>
        </div>
        <iframe id="app-iframe" class="app-frame" src="http://localhost:3000" width="390" height="844" scrolling="yes"></iframe>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
  <p class="tip">
    Touch mode: <kbd>F12</kbd> then <kbd>Ctrl+Shift+M</kbd> in Chrome<br>
    Or open <a href="http://localhost:3000" target="_blank">localhost:3000</a> in responsive mode
  </p>
  <script>
    function updateClock() {
      var now=new Date(), h=now.getHours()%12||12, m=String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = h+':'+m;
    }
    updateClock(); setInterval(updateClock, 30000);
    function setDevice(btn, w, h, name) {
      var iframe=document.getElementById('app-iframe'), screen=document.getElementById('screen');
      iframe.width=w; iframe.height=h;
      screen.style.width=w+'px'; screen.style.height=h+'px';
      document.getElementById('device-label').textContent = name+'  '+w+'x'+h;
      document.querySelectorAll('.device-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
    }
  </script>
</body>
</html>
